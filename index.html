<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>crm beleza</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,Arial,sans-serif;display:flex;flex-direction:column;background:#FBF6F3}
.abas{display:flex;background:#fff;border-bottom:1px solid #EFE1DC;box-shadow:0 2px 8px rgba(94,52,83,.05);flex:0 0 auto}
.aba{flex:1;border:none;background:none;padding:14px 8px;font-family:inherit;font-size:14.5px;font-weight:600;color:#9A868D;cursor:pointer;border-bottom:3px solid transparent}
.aba.on{color:#834E71;border-bottom-color:#834E71}
.aba:active{background:#FCF7F5}
iframe{flex:1 1 auto;width:100%;border:none;background:#FBF6F3}
</style>
</head>
<body>
  <div class="abas">
    <button class="aba on" data-src="painel.html">Painel</button>
    <button class="aba" data-src="agendar.html">Agenda</button>
    <button class="aba" data-src="configurar.html">Configurar</button>
  </div>
  <iframe id="quadro" src="painel.html" title="conteúdo"></iframe>
  <script>
    const quadro = document.getElementById('quadro');
    document.querySelectorAll('.aba').forEach(function(b){
      b.addEventListener('click', function(){
        document.querySelectorAll('.aba').forEach(function(x){ x.classList.remove('on'); });
        b.classList.add('on');
        quadro.src = b.dataset.src;
      });
    });
  </script>
</body>
</html>
