<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>crm beleza</title>
<style>
:root{
  --bg:#FBF6F3;--surface:#FFFFFF;--ink:#3B2E33;--muted:#9A868D;
  --plum:#834E71;--plum-deep:#5E3453;--blush:#E4A294;--blush-soft:#F6DED7;
  --line:#EFE1DC;
  --font-display:'Cambria','Georgia','Times New Roman',serif;
  --font-body:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,'Helvetica Neue',Arial,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:var(--font-body);background:var(--bg);color:var(--ink)}
.oculto{display:none !important}

/* Página inicial */
.home{max-width:520px;margin:0 auto;min-height:100%;display:flex;flex-direction:column;padding:0 16px 30px}
.cab{background:var(--plum);color:#fff;margin:0 -16px 22px;padding:30px 22px 34px;border-radius:0 0 28px 28px;text-align:center}
.cab h1{font-family:var(--font-display);font-weight:700;font-size:25px}
.cab p{color:#F1DCE7;font-size:14px;margin-top:6px}
.botoes{display:flex;flex-direction:column;gap:14px}
.hbtn{display:flex;align-items:center;gap:16px;width:100%;text-align:left;background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:20px 18px;cursor:pointer;box-shadow:0 2px 10px rgba(94,52,83,.06);font-family:var(--font-body)}
.hbtn:active{transform:scale(.99);background:#FCF7F5}
.hic{flex:0 0 auto;width:56px;height:56px;border-radius:16px;background:var(--blush-soft);color:var(--plum);display:flex;align-items:center;justify-content:center}
.hic svg{width:28px;height:28px}
.htx{display:flex;flex-direction:column}
.ht{font-family:var(--font-display);font-weight:700;font-size:18px;color:var(--plum-deep)}
.hs{font-size:13px;color:var(--muted);margin-top:2px}

/* Visor com a parte aberta */
.visor{position:fixed;inset:0;display:flex;flex-direction:column;background:var(--bg)}
.barra{flex:0 0 auto;background:var(--surface);border-bottom:1px solid var(--line);display:flex;align-items:center;padding:10px 14px;box-shadow:0 2px 8px rgba(94,52,83,.05)}
.voltar{background:var(--blush-soft);border:none;color:var(--plum-deep);border-radius:11px;padding:9px 14px;font-family:var(--font-body);font-weight:600;font-size:14px;cursor:pointer}
.barra .tit{margin-left:12px;font-family:var(--font-display);font-weight:700;font-size:16px;color:var(--plum-deep)}
iframe{flex:1 1 auto;width:100%;border:none;background:var(--bg)}
</style>
</head>
<body>

<div id="home" class="home">
  <div class="cab">
    <h1>crm beleza</h1>
    <p>O que você quer fazer?</p>
  </div>
  <div class="botoes">
    <button class="hbtn" data-src="painel.html#cadastro" data-tit="Cadastrar cliente">
      <span class="hic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="10" cy="8" r="3.4"/><path d="M4 20c0-3.2 2.7-5.6 6-5.6M17 8v6M20 11h-6"/></svg></span>
      <span class="htx"><span class="ht">Cadastrar cliente novo</span><span class="hs">Adicionar uma cliente à sua base</span></span>
    </button>
    <button class="hbtn" data-src="painel.html#agenda" data-tit="Agenda">
      <span class="hic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="3.5" y="5" width="17" height="15" rx="2.5"/><path d="M3.5 9.5h17M8 3v3M16 3v3"/></svg></span>
      <span class="htx"><span class="ht">Ver a agenda</span><span class="hs">Seus atendimentos marcados</span></span>
    </button>
    <button class="hbtn" data-src="agendar.html" data-tit="Agendar">
      <span class="hic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M12 3v18M3 12h18" opacity="0"/><circle cx="12" cy="12" r="8.5"/><path d="M12 8v4l2.5 2.5"/></svg></span>
      <span class="htx"><span class="ht">Agendar a partir do serviço</span><span class="hs">Escolher serviço, dia e horário</span></span>
    </button>
  </div>
</div>

<div id="visor" class="visor oculto">
  <div class="barra">
    <button class="voltar" id="voltar">‹ Início</button>
    <span class="tit" id="tit"></span>
  </div>
  <iframe id="quadro" title="conteúdo"></iframe>
</div>

<script>
  const home = document.getElementById('home');
  const visor = document.getElementById('visor');
  const quadro = document.getElementById('quadro');
  const tit = document.getElementById('tit');
  document.querySelectorAll('.hbtn').forEach(function(b){
    b.addEventListener('click', function(){
      quadro.src = b.dataset.src;
      tit.textContent = b.dataset.tit;
      home.classList.add('oculto');
      visor.classList.remove('oculto');
    });
  });
  document.getElementById('voltar').addEventListener('click', function(){
    visor.classList.add('oculto');
    home.classList.remove('oculto');
    quadro.src = 'about:blank';
  });
</script>
</body>
</html>
