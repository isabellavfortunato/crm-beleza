<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CRM beleza e bem-estar</title>
<style>
/* Sistema de cores e tipografia */
:root{
  --bg:#FBF6F3;
  --surface:#FFFFFF;
  --ink:#3B2E33;
  --muted:#9A868D;
  --plum:#834E71;
  --plum-deep:#5E3453;
  --blush:#E4A294;
  --blush-soft:#F6DED7;
  --line:#EFE1DC;
  --sage:#7E9B86;
  --alert:#C56A55;
  --gold:#C9A15A;
  --font-display:'Cambria','Georgia','Times New Roman',serif;
  --font-body:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,'Helvetica Neue',Arial,sans-serif;
  --shadow:0 6px 24px rgba(94,52,83,.08);
  --shadow-soft:0 2px 10px rgba(94,52,83,.06);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--ink);font-family:var(--font-body);font-size:16px;line-height:1.45}
body{max-width:520px;margin:0 auto;min-height:100vh;position:relative;padding-bottom:88px}
h1,h2,h3{font-family:var(--font-display);font-weight:700;line-height:1.2}

/* Cabeçalho */
.topo{background:var(--plum);color:#fff;padding:22px 20px 30px;border-radius:0 0 26px 26px;position:relative}
.topo-linha{display:flex;align-items:center;justify-content:space-between}
.topo h1{font-size:22px;color:#fff;letter-spacing:.2px}
.topo .sub{color:#F1DCE7;font-size:13px;margin-top:2px}
.ajustes-btn{background:rgba(255,255,255,.14);border:none;color:#fff;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer}
.ajustes-btn:active{background:rgba(255,255,255,.26)}

/* Conteúdo */
.conteudo{padding:18px 16px 24px}
.tela{display:none}
.tela.ativa{display:block;animation:sobe .28s ease}
@keyframes sobe{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.secao-titulo{font-family:var(--font-display);font-size:19px;margin:6px 2px 12px;color:var(--plum-deep)}
.secao-sub{font-size:13px;color:var(--muted);margin:-8px 2px 14px}

/* Cartões */
.card{background:var(--surface);border-radius:18px;box-shadow:var(--shadow-soft);padding:16px;margin-bottom:14px;border:1px solid var(--line)}
.card-titulo{display:flex;align-items:center;gap:8px;font-family:var(--font-display);font-size:16px;color:var(--plum-deep);margin-bottom:10px}
.card-titulo .conta{margin-left:auto;background:var(--blush-soft);color:var(--plum-deep);font-family:var(--font-body);font-weight:600;font-size:12px;padding:2px 9px;border-radius:20px}

/* Linha de cliente */
.linha{display:flex;align-items:center;gap:12px;padding:11px 4px;border-bottom:1px solid var(--line);cursor:pointer}
.linha:last-child{border-bottom:none}
.avatar{width:42px;height:42px;border-radius:50%;background:var(--blush-soft);color:var(--plum);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;font-size:17px;flex:0 0 auto}
.linha-info{flex:1;min-width:0}
.linha-nome{font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.linha-det{font-size:12.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.linha-lado{text-align:right;font-size:12px;flex:0 0 auto}

/* Selos de situação */
.selo{display:inline-block;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap}
.selo.pendente{background:#FBE7E0;color:var(--alert)}
.selo.sumida{background:#F0EAEC;color:#8A6E7B}
.selo.emdia{background:#E6EFE8;color:var(--sage)}
.selo.nova{background:#FBF1DC;color:#A5822F}
.selo.aniversario{background:var(--blush-soft);color:var(--plum)}

/* Botões */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:14px;font-family:var(--font-body);font-weight:600;font-size:15px;padding:13px 18px;cursor:pointer;transition:transform .06s}
.btn:active{transform:scale(.98)}
.btn-primario{background:var(--plum);color:#fff}
.btn-primario:active{background:var(--plum-deep)}
.btn-suave{background:var(--blush-soft);color:var(--plum-deep)}
.btn-contorno{background:transparent;color:var(--plum);border:1.5px solid var(--line)}
.btn-verde{background:var(--sage);color:#fff}
.btn-largo{width:100%}
.btn-pequeno{padding:9px 13px;font-size:13.5px;border-radius:11px}
.wpp{background:#25A768;color:#fff}
.btn-parabens{background:#25A768;color:#fff;border:none;border-radius:9px;padding:5px 11px;font-family:var(--font-body);font-size:11.5px;font-weight:600;cursor:pointer}
.btn-parabens:active{background:#1f8b56}
.wpp:active{background:#1f8b56}

/* Busca e filtros */
.busca{width:100%;border:1.5px solid var(--line);background:var(--surface);border-radius:14px;padding:12px 15px;font-family:var(--font-body);font-size:15px;color:var(--ink);margin-bottom:12px}
.busca:focus{outline:none;border-color:var(--plum)}
.filtros{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:6px;scrollbar-width:none}
.filtros::-webkit-scrollbar{display:none}
.chip{border:1.5px solid var(--line);background:var(--surface);color:var(--muted);border-radius:20px;padding:7px 14px;font-size:13px;font-weight:600;white-space:nowrap;cursor:pointer;flex:0 0 auto}
.chip.on{background:var(--plum);color:#fff;border-color:var(--plum)}

/* Painel financeiro */
.metricas{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.metrica{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:15px;box-shadow:var(--shadow-soft)}
.metrica.destaque{grid-column:1 / -1;background:linear-gradient(135deg,var(--plum),var(--plum-deep));border:none;color:#fff}
.metrica .rot{font-size:12.5px;color:var(--muted);margin-bottom:5px}
.metrica.destaque .rot{color:#F1DCE7}
.metrica .val{font-family:var(--font-display);font-size:26px;font-weight:700}
.mes-nav{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:8px 10px;margin-bottom:14px}
.mes-nav button{background:var(--blush-soft);border:none;color:var(--plum-deep);width:36px;height:36px;border-radius:10px;font-size:18px;cursor:pointer}
.mes-nav .rotulo{font-family:var(--font-display);font-weight:700;font-size:16px}

/* Estado vazio */
.vazio{text-align:center;padding:34px 20px;color:var(--muted)}
.vazio .icone{width:64px;height:64px;border-radius:50%;background:var(--blush-soft);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;color:var(--plum)}
.vazio p{font-size:14px;margin-bottom:16px;line-height:1.5}

/* Tela início com três botões */
.hub{display:flex;flex-direction:column;gap:14px;margin-top:6px}
.hub-btn{display:flex;align-items:center;gap:16px;width:100%;text-align:left;background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:20px 18px;cursor:pointer;box-shadow:var(--shadow-soft);font-family:var(--font-body)}
.hub-btn:active{transform:scale(.99);background:#FCF7F5}
.hub-ic{flex:0 0 auto;width:54px;height:54px;border-radius:16px;background:var(--blush-soft);color:var(--plum);display:flex;align-items:center;justify-content:center}
.hub-ic svg{width:27px;height:27px}
.hub-tx{display:flex;flex-direction:column}
.hub-t{font-family:var(--font-display);font-weight:700;font-size:18px;color:var(--plum-deep)}
.hub-s{font-size:13px;color:var(--muted);margin-top:2px}
.hub-nota{display:block;width:100%;margin-top:16px;background:#FBE7E0;color:var(--alert);border:none;border-radius:14px;padding:14px;font-family:var(--font-body);font-weight:600;font-size:13.5px;cursor:pointer;text-align:center}

/* Barra de navegação */
.navbar{position:fixed;bottom:0;left:0;right:0;max-width:520px;margin:0 auto;background:var(--surface);border-top:1px solid var(--line);display:flex;padding:8px 6px calc(8px + env(safe-area-inset-bottom));box-shadow:0 -4px 20px rgba(94,52,83,.06);z-index:40}
.nav-item{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;cursor:pointer;color:var(--muted);font-family:var(--font-body);font-size:11px;font-weight:600}
.nav-item svg{width:23px;height:23px;stroke:currentColor;fill:none;stroke-width:1.7}
.nav-item.on{color:var(--plum)}

/* Botão flutuante de adicionar */
.fab{position:fixed;right:calc(50% - 260px + 18px);bottom:98px;width:56px;height:56px;border-radius:50%;background:var(--plum);color:#fff;border:none;box-shadow:0 8px 22px rgba(94,52,83,.32);font-size:30px;line-height:1;cursor:pointer;z-index:41;display:flex;align-items:center;justify-content:center}
.fab:active{background:var(--plum-deep)}
@media(max-width:540px){.fab{right:18px}}

/* Modal */
.modal-fundo{position:fixed;inset:0;background:rgba(59,46,51,.42);z-index:60;display:none;align-items:flex-end;justify-content:center}
.modal-fundo.aberto{display:flex}
.modal{background:var(--surface);width:100%;max-width:520px;border-radius:24px 24px 0 0;padding:22px 20px calc(24px + env(safe-area-inset-bottom));max-height:92vh;overflow-y:auto;animation:sobeModal .3s ease}
@keyframes sobeModal{from{transform:translateY(100%)}to{transform:none}}
.modal-cabe{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.modal-cabe h2{font-size:20px;color:var(--plum-deep)}
.fechar{background:var(--bg);border:none;width:36px;height:36px;border-radius:50%;font-size:20px;color:var(--muted);cursor:pointer}
.campo{margin-bottom:14px}
.campo label{display:block;font-size:13px;font-weight:600;color:var(--plum-deep);margin-bottom:6px}
.campo input,.campo select,.campo textarea{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:12px 14px;font-family:var(--font-body);font-size:15px;color:var(--ink);background:var(--surface)}
.campo input:focus,.campo select:focus,.campo textarea:focus{outline:none;border-color:var(--plum)}
.campo textarea{resize:vertical;min-height:64px}
.dois{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* Detalhe da cliente */
.perfil{text-align:center;margin-bottom:6px}
.perfil .avatar-grande{width:76px;height:76px;border-radius:50%;background:var(--blush-soft);color:var(--plum);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;font-size:30px;margin:0 auto 10px}
.perfil h2{font-size:22px;color:var(--plum-deep)}
.perfil .contato{color:var(--muted);font-size:14px;margin-top:2px}
.acoes-perfil{display:flex;gap:10px;margin:16px 0}
.acoes-perfil .btn{flex:1}
.resumo-perfil{display:flex;gap:10px;margin-bottom:16px}
.resumo-perfil .bloco{flex:1;background:var(--bg);border-radius:14px;padding:12px;text-align:center}
.resumo-perfil .bloco .n{font-family:var(--font-display);font-size:20px;font-weight:700;color:var(--plum-deep)}
.resumo-perfil .bloco .l{font-size:11.5px;color:var(--muted);margin-top:2px}
.obs-box{background:var(--blush-soft);border-radius:14px;padding:13px 15px;font-size:14px;color:var(--plum-deep);margin-bottom:16px;line-height:1.5}
.hist-item{display:flex;justify-content:space-between;align-items:flex-start;padding:12px 2px;border-bottom:1px solid var(--line)}
.hist-item:last-child{border-bottom:none}
.hist-serv{font-weight:600;font-size:14.5px}
.hist-data{font-size:12.5px;color:var(--muted);margin-top:2px}
.hist-obs{font-size:12.5px;color:var(--muted);margin-top:3px;font-style:italic}
.hist-valor{font-family:var(--font-display);font-weight:700;color:var(--sage);white-space:nowrap}

/* Agenda */
.dia-grupo{margin-bottom:18px}
.dia-cabe{font-family:var(--font-display);font-weight:700;font-size:15px;color:var(--plum-deep);margin:4px 2px 8px;text-transform:capitalize}
.agenda-item{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:9px}
.agenda-hora{font-family:var(--font-display);font-weight:700;font-size:16px;color:var(--plum);background:var(--blush-soft);border-radius:10px;padding:8px 10px;text-align:center;min-width:58px}
.agenda-info{flex:1;min-width:0}
.agenda-info .n{font-weight:600;font-size:14.5px}
.agenda-info .s{font-size:12.5px;color:var(--muted)}
.agenda-acao{background:var(--sage);border:none;color:#fff;border-radius:10px;padding:8px 11px;font-size:12.5px;font-weight:600;cursor:pointer;white-space:nowrap}

/* Ajustes */
.serv-linha{display:flex;align-items:center;gap:10px;padding:10px 2px;border-bottom:1px solid var(--line)}
.serv-linha:last-child{border-bottom:none}
.serv-linha .nome{flex:1;font-weight:600;font-size:14.5px}
.serv-linha .dias{font-size:12.5px;color:var(--muted)}
.serv-linha .rem{background:none;border:none;color:var(--alert);font-size:18px;cursor:pointer;padding:4px}
.bloco-ajuste{margin-bottom:22px}
.bloco-ajuste h3{font-size:16px;color:var(--plum-deep);margin-bottom:10px}

.aviso-arquivo{background:#FBF1DC;color:#7A5E1E;border-radius:12px;padding:11px 13px;font-size:12.5px;line-height:1.5;margin-top:8px}

/* Relatório da cliente */
#relatorio-overlay{display:none;position:fixed;inset:0;background:#fff;z-index:70;overflow-y:auto;padding:26px 22px calc(30px + env(safe-area-inset-bottom))}
.rel-doc{font-family:var(--font-display);color:#2c2226;max-width:560px;margin:0 auto}
.rel-cabe{border-bottom:2px solid var(--plum);padding-bottom:14px;margin-bottom:18px}
.rel-cabe .neg{font-size:23px;font-weight:700;color:var(--plum-deep)}
.rel-cabe .tt{font-size:14px;color:#6b5b62;margin-top:2px}
.rel-cliente{font-size:15px;margin-bottom:18px;line-height:1.7}
.rel-tabela{width:100%;border-collapse:collapse;font-size:13.5px;margin-bottom:20px}
.rel-tabela th{text-align:left;border-bottom:1.5px solid var(--plum);padding:8px 6px;color:var(--plum-deep);font-size:12.5px}
.rel-tabela td{border-bottom:1px solid var(--line);padding:9px 6px;vertical-align:top}
.rel-tabela td.v{text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums}
.rel-totais{margin-left:auto;width:270px;font-size:14px}
.rel-totais .lin{display:flex;justify-content:space-between;padding:6px 0}
.rel-totais .lin.forte{border-top:1.5px solid var(--plum);margin-top:4px;padding-top:10px;font-weight:700;font-size:17px}
.rel-areceber{color:var(--alert)}
#rel-acoes{max-width:560px;margin:24px auto 0;display:flex;gap:10px;flex-wrap:wrap}
#rel-acoes .btn{flex:1;min-width:150px}
@media print{
  body{padding:0;max-width:none}
  .topo,.navbar,.fab,.conteudo,.modal-fundo{display:none !important}
  #relatorio-overlay{position:static;padding:0;display:block}
  #rel-acoes{display:none !important}
}
.rodape-nota{text-align:center;font-size:11.5px;color:var(--muted);padding:8px 20px 14px;line-height:1.5}
</style>
</head>
<body>

<div class="topo">
  <div class="topo-linha">
    <div>
      <h1 id="topo-titulo">Início</h1>
      <div class="sub" id="topo-sub">Sua agenda de cuidado com as clientes</div>
    </div>
    <button class="ajustes-btn" onclick="abrirAjustes()" aria-label="Ajustes">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </div>
</div>

<div class="conteudo">
  <div id="tela-inicio" class="tela ativa"></div>
  <div id="tela-clientes" class="tela"></div>
  <div id="tela-agenda" class="tela"></div>
  <div id="tela-financeiro" class="tela"></div>
</div>

<button class="fab" id="fab" onclick="acaoFab()">+</button>

<nav class="navbar">
  <button class="nav-item on" data-tela="inicio" onclick="irPara('inicio')">
    <svg viewBox="0 0 24 24"><path d="M3 9.5 12 3l9 6.5V20a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1z"/></svg>
    Início
  </button>
  <button class="nav-item" data-tela="clientes" onclick="irPara('clientes')">
    <svg viewBox="0 0 24 24"><circle cx="9" cy="8" r="3.2"/><path d="M3.5 20c0-3 2.5-5 5.5-5s5.5 2 5.5 5"/><path d="M16 6.5a3 3 0 0 1 0 5.5M17.5 20c0-2.2-1-3.8-2.5-4.7"/></svg>
    Clientes
  </button>
  <button class="nav-item" data-tela="agenda" onclick="irPara('agenda')">
    <svg viewBox="0 0 24 24"><rect x="3.5" y="5" width="17" height="15" rx="2.5"/><path d="M3.5 9.5h17M8 3v3M16 3v3"/></svg>
    Agenda
  </button>
  <button class="nav-item" data-tela="financeiro" onclick="irPara('financeiro')">
    <svg viewBox="0 0 24 24"><path d="M4 20V10M10 20V4M16 20v-7M22 20H2"/></svg>
    Financeiro
  </button>
</nav>

<div class="modal-fundo" id="modal-fundo">
  <div class="modal" id="modal"></div>
</div>

<div id="relatorio-overlay"></div>

<script>
/* ============================================================
   CRM beleza e bem-estar
   Aplicativo em arquivo único. Todos os dados ficam guardados
   no localStorage do navegador, no próprio aparelho.
   ============================================================ */

/* ---------- Configuração padrão de serviços ---------- */
function configPadrao(){
  return {
    servicos:[
      {nome:'Extensão de cílios', diasRetorno:18},
      {nome:'Manutenção de cílios', diasRetorno:18},
      {nome:'Manicure', diasRetorno:15},
      {nome:'Pedicure', diasRetorno:20},
      {nome:'Design de sobrancelhas', diasRetorno:21},
      {nome:'Limpeza de pele', diasRetorno:30},
      {nome:'Massagem', diasRetorno:15},
      {nome:'Drenagem linfática', diasRetorno:7},
      {nome:'Consulta de emagrecimento', diasRetorno:7},
      {nome:'Depilação', diasRetorno:25}
    ],
    diasSemRetorno:45,
    telaInicial:'painel',
    negocio:{nome:'',telefone:''},
    mensagensAniversario:mensagensAnivPadrao()
  };
}
function mensagensAnivPadrao(){
  return [
    'Oi [nome], passando para te desejar um feliz aniversário 🎉 Que o seu dia seja lindo e cheio de coisas boas 💛 Um beijo.',
    'Feliz aniversário, [nome] 🥳 Desejo um ano cheio de saúde e alegrias. E se quiser se presentear, vou adorar te receber para um momento só seu 🌸',
    'Oi [nome], feliz aniversário 🎂 Para comemorar com você, preparei um cuidado especial no seu próximo atendimento deste mês ✨ Vai ser um prazer te receber.',
    '[nome], que este novo ano venha leve e feliz 🌷 Obrigada por confiar no meu trabalho 💕 Te desejo tudo de bom.'
  ];
}

/* ---------- Estado e persistência ---------- */
let estado = {
  clientes:[],
  atendimentos:[],
  agendamentos:[],
  config:configPadrao(),
  telaAtual:'inicio',
  filtroCliente:'todas',
  buscaCliente:'',
  mesFinanceiro:new Date()
};

function carregar(){
  try{
    estado.clientes = JSON.parse(localStorage.getItem('crm.clientes')||'[]');
    estado.atendimentos = JSON.parse(localStorage.getItem('crm.atendimentos')||'[]');
    estado.agendamentos = JSON.parse(localStorage.getItem('crm.agendamentos')||'[]');
    const c = JSON.parse(localStorage.getItem('crm.config')||'null');
    estado.config = c || configPadrao();
  }catch(e){ console.warn('Falha ao ler dados salvos', e); }
}
function salvar(){

/* ---------- Utilidades ---------- */
const brl = new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'});
function id(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function hoje(){ const d=new Date(); return new Date(d.getFullYear(),d.getMonth(),d.getDate()); }
function dataDeIso(iso){ if(!iso) return null; const p=iso.split('-'); return new Date(+p[0],+p[1]-1,+p[2]); }
function isoDeData(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function formatarData(iso){ const d=dataDeIso(iso); if(!d) return ''; return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear(); }
function diasEntre(a,b){ return Math.round((b-a)/86400000); }
function iniciais(nome){ const p=nome.trim().split(/\s+/); return ((p[0]||'')[0]||'')+((p[1]||'')[0]||''); }
function escapar(t){ return (t||'').replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s])); }
function semAcento(s){ return (s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim(); }
function meses(){ return ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro']; }
function diasSemana(){ return ['domingo','segunda-feira','terça-feira','quarta-feira','quinta-feira','sexta-feira','sábado']; }

/* ---------- Regras de retorno ---------- */
function atendimentosDe(clienteId){
  return estado.atendimentos.filter(a=>a.clienteId===clienteId).sort((x,y)=>y.data.localeCompare(x.data));
}
function ultimoAtendimento(clienteId){
  const a = atendimentosDe(clienteId);
  return a.length ? a[0] : null;
}
/* ---------- Regras de pagamento e parcelas ---------- */
/* Cada atendimento pode ter um array parcelas: [{valor, vencimento, pago, dataPagamento}].
   Registros antigos sem parcelas são convertidos a partir do status. */
function parcelasDe(a){
  if(Array.isArray(a.parcelas) && a.parcelas.length) return a.parcelas;
  const pago = !(a.status==='aReceber' || a.formaPagamento==='A receber');
  return [{ valor:(+a.valor||0), vencimento:a.data, pago, dataPagamento: pago?a.data:null }];
}
function valorPago(a){ return parcelasDe(a).reduce((s,p)=>s+(p.pago?(+p.valor||0):0),0); }
function valorAberto(a){ return parcelasDe(a).reduce((s,p)=>s+(!p.pago?(+p.valor||0):0),0); }
function quitado(a){ return valorAberto(a) < 0.005; }
function ehParcelado(a){ return Array.isArray(a.parcelas) && a.parcelas.length>1; }
/* Situação geral para os selos */
function statusPagamento(a){ return quitado(a) ? 'pago' : 'aReceber'; }
/* Gera parcelas iguais com vencimento mês a mês */
function gerarParcelas(total, n, dataBase, primeiraPaga){
  const parcelas=[];
  const centavos=Math.round((+total||0)*100);
  const base=Math.floor(centavos/n);
  for(let i=0;i<n;i++){
    const c = (i===n-1) ? (centavos - base*(n-1)) : base;
    parcelas.push({ valor:c/100, vencimento:addMeses(dataBase,i), pago:(i===0 && primeiraPaga), dataPagamento:(i===0 && primeiraPaga)?isoDeData(hoje()):null });
  }
  return parcelas;
}
function addMeses(iso, n){
  const d = dataDeIso(iso) || hoje();
  const alvo = new Date(d.getFullYear(), d.getMonth()+n, d.getDate());
  return isoDeData(alvo);
}
/* Totais financeiros de uma cliente considerando parcelas */
function totaisCliente(clienteId){
  const h = atendimentosDe(clienteId);
  let total=0, recebido=0, aReceber=0;
  h.forEach(a=>{
    total += (+a.valor||0);
    recebido += valorPago(a);
    aReceber += valorAberto(a);
  });
  return {total, recebido, aReceber, qtd:h.length};
}
function diasRetornoServico(nomeServico){
  const s = estado.config.servicos.find(s=>s.nome===nomeServico);
  return s ? s.diasRetorno : 21;
}
/* Situação: nova, pendente, sumida, emdia */
function situacaoCliente(cliente){
  const ult = ultimoAtendimento(cliente.id);
  if(!ult) return {tipo:'nova', diasDesde:null, previsto:null};
  const d = diasEntre(dataDeIso(ult.data), hoje());
  const previsto = diasRetornoServico(ult.servico);
  const limite = estado.config.diasSemRetorno;
  if(d > limite) return {tipo:'sumida', diasDesde:d, previsto};
  if(d >= previsto) return {tipo:'pendente', diasDesde:d, previsto};
  return {tipo:'emdia', diasDesde:d, previsto};
}
function proximoRetornoIso(cliente){
  const ult = ultimoAtendimento(cliente.id);
  if(!ult) return null;
  const d = dataDeIso(ult.data);
  d.setDate(d.getDate()+diasRetornoServico(ult.servico));
  return isoDeData(d);
}
/* Aniversário guardado como MM-DD. Registros antigos em AAAA-MM-DD continuam sendo lidos. */
function mesAniversario(a){ if(!a) return null; const p=String(a).split('-'); return p.length===2?(+p[0]):(+p[1]); }
function diaAniversario(a){ if(!a) return null; const p=String(a).split('-'); return p.length===2?(+p[1]):(+p[2]); }
function formatarAniversario(a){ const d=diaAniversario(a), m=mesAniversario(a); if(!d||!m) return ''; return String(d).padStart(2,'0')+'/'+String(m).padStart(2,'0'); }
function ehAniversarianteDoMes(cliente){
  if(!cliente.aniversario) return false;
  return mesAniversario(cliente.aniversario) === (hoje().getMonth()+1);
}

/* ---------- WhatsApp ---------- */
function linkWhatsapp(telefone, texto){
  let n = (telefone||'').replace(/\D/g,'');
  if(n.length>0 && n.length<=11 && !n.startsWith('55')) n = '55'+n;
  return 'https://wa.me/'+n+(texto?('?text='+encodeURIComponent(texto)):'');
}

      const parc = parcelasDe(a);
      html += '<div class="hist-item"><div style="flex:1;min-width:0"><div class="hist-serv">'+escapar(a.servico)+'</div>';
      html += '<div class="hist-data">'+formatarData(a.data)+(a.formaPagamento && !ehParcelado(a) && aberto<0.005?(' · '+escapar(a.formaPagamento)):'')+(ehParcelado(a)?(' · '+parc.length+'x'):'')+'</div>';
      if(aberto>=0.005){
        html += '<div style="margin-top:6px">';
        parc.forEach((p,i)=>{
          if(p.pago) return;
          html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px"><span class="selo pendente">'+(ehParcelado(a)?('parcela '+(i+1)):'a receber')+' · '+brl.format(+p.valor||0)+'</span>';
          html += '<span style="font-size:11.5px;color:var(--muted)">vence '+formatarData(p.vencimento)+'</span>';
          html += '<button class="btn btn-suave" style="padding:4px 10px;font-size:11.5px;border-radius:9px" onclick="marcarParcela(\''+a.id+'\','+i+',\''+clienteId+'\')">Marcar paga</button></div>';
        });
        html += '</div>';
      }
      if(a.observacoes) html += '<div class="hist-obs">'+escapar(a.observacoes)+'</div>';
      html += '</div><div class="hist-valor" style="color:'+(aberto>=0.005?'var(--alert)':'var(--sage)')+'">'+brl.format(+a.valor||0)+'</div></div>';
    });
  }

  html += '<button class="btn btn-suave btn-largo" style="margin-top:16px" onclick="relatorioCliente(\''+c.id+'\')">Gerar relatório da cliente</button>';

  html += '<div style="display:flex;gap:10px;margin-top:10px">';
  html += '<button class="btn btn-contorno btn-largo" onclick="formCliente(\''+c.id+'\')">Editar dados</button>';
  html += '<button class="btn btn-contorno btn-pequeno" style="color:var(--alert);border-color:#F1D5CD" onclick="excluirCliente(\''+c.id+'\')">Excluir</button>';
  html += '</div>';

  abrirModal(html);
}
/* Marca uma parcela específica como paga */
function marcarParcela(atId, indice, clienteId){
  const a = estado.atendimentos.find(x=>x.id===atId);
  if(!a) return;
  const parc = parcelasDe(a);
  if(!Array.isArray(a.parcelas) || !a.parcelas.length) a.parcelas = parc;
  a.parcelas[indice].pago = true;
  a.parcelas[indice].dataPagamento = isoDeData(hoje());
  salvar(); verCliente(clienteId);
}
/* Relatório impresso por cliente */
function relatorioCliente(clienteId){
  const c = estado.clientes.find(x=>x.id===clienteId);
  if(!c) return;
  const hist = atendimentosDe(clienteId).slice().sort((a,b)=>a.data.localeCompare(b.data));
  const t = totaisCliente(clienteId);
  const neg = (estado.config.negocio && estado.config.negocio.nome) ? estado.config.negocio.nome : 'Meu negócio';
  let linhas = '';
  hist.forEach(a=>{
    const aberto = valorAberto(a);
    let pag;
    if(ehParcelado(a)){ const parc=parcelasDe(a); const pagas=parc.filter(p=>p.pago).length; pag = 'Parcelado '+pagas+' de '+parc.length; }
    else if(aberto>=0.005) pag = 'A receber';
    else pag = escapar(a.formaPagamento||'Pago');
    linhas += '<tr><td>'+formatarData(a.data)+'</td><td>'+escapar(a.servico)+'</td><td>'+pag+'</td><td class="v">'+brl.format(+a.valor||0)+'</td></tr>';
  });
  if(hist.length===0) linhas = '<tr><td colspan="4" style="color:#999;padding:14px 6px">Nenhum atendimento registrado.</td></tr>';

  let html = '<div class="rel-doc">';
  html += '<div class="rel-cabe"><div class="neg">'+escapar(neg)+'</div><div class="tt">Relatório de atendimentos</div></div>';
  html += '<div class="rel-cliente"><strong>Cliente:</strong> '+escapar(c.nome)+(c.telefone?('<br><strong>Telefone:</strong> '+escapar(c.telefone)):'')+'<br><strong>Emitido em:</strong> '+formatarData(isoDeData(hoje()))+'</div>';
  html += '<table class="rel-tabela"><thead><tr><th>Data</th><th>Serviço</th><th>Pagamento</th><th style="text-align:right">Valor</th></tr></thead><tbody>'+linhas+'</tbody></table>';
  html += '<div class="rel-totais">';
  html += '<div class="lin"><span>Atendimentos</span><span>'+t.qtd+'</span></div>';
  html += '<div class="lin"><span>Total geral</span><span>'+brl.format(t.total)+'</span></div>';
  html += '<div class="lin"><span>Já recebido</span><span>'+brl.format(t.recebido)+'</span></div>';
  html += '<div class="lin forte"><span>A receber</span><span class="'+(t.aReceber>0?'rel-areceber':'')+'">'+brl.format(t.aReceber)+'</span></div>';
  html += '</div></div>';

  html += '<div id="rel-acoes">';
  html += '<button class="btn btn-primario" onclick="window.print()">Imprimir ou salvar em PDF</button>';
  if(c.telefone && t.aReceber>0){
    const msg = 'Olá '+c.nome.split(' ')[0]+', segue o resumo dos seus atendimentos. Valor a receber de '+brl.format(t.aReceber)+'. Qualquer dúvida estou à disposição.';
    html += '<a class="btn wpp" href="'+linkWhatsapp(c.telefone,msg)+'" target="_blank" rel="noopener">Enviar no WhatsApp</a>';
  }
  html += '<button class="btn btn-contorno" onclick="fecharRelatorio()">Fechar</button>';
  html += '</div>';

  const ov = document.getElementById('relatorio-overlay');
  ov.innerHTML = html; ov.style.display='block'; document.body.style.overflow='hidden';
  fecharModal(); window.scrollTo(0,0);
}
function fecharRelatorio(){
  const ov = document.getElementById('relatorio-overlay');
  ov.style.display='none'; ov.innerHTML=''; document.body.style.overflow='';
}
function excluirCliente(clienteId){
  if(!confirm('Excluir esta cliente e todo o histórico dela? Esta ação não pode ser desfeita.')) return;
  estado.clientes = estado.clientes.filter(c=>c.id!==clienteId);
  estado.atendimentos = estado.atendimentos.filter(a=>a.clienteId!==clienteId);
  estado.agendamentos = estado.agendamentos.filter(a=>a.clienteId!==clienteId);
  salvar(); fecharModal(); renderizar();
}

function montarAniversario(){
  const d = document.getElementById('f-aniv-dia').value;
  const m = document.getElementById('f-aniv-mes').value;
  if(!d || !m) return '';
  return String(m).padStart(2,'0')+'-'+String(d).padStart(2,'0');
}
let clientePendente = null;
function salvarCliente(clienteId){
  const nome = document.getElementById('f-nome').value.trim();
  if(!nome){ alert('Informe o nome da cliente.'); return; }
  const dados = {
    nome,
    telefone: document.getElementById('f-tel').value.trim(),
    aniversario: montarAniversario(),
    origem: document.getElementById('f-origem').value.trim(),
    observacoes: document.getElementById('f-obs').value.trim()
  };
  if(clienteId){
    const c = estado.clientes.find(x=>x.id===clienteId);
    Object.assign(c, dados);
    salvar(); fecharModal(); verCliente(clienteId);
    return;
  }
  const existente = acharClienteExistente(dados.nome, dados.telefone);
  if(existente){ clientePendente = dados; avisarDuplicado(existente); return; }
  finalizarNovoCliente(dados);
}
function finalizarNovoCliente(dados){
  dados.id = id();
  dados.dataCadastro = isoDeData(hoje());
  estado.clientes.push(dados);
  salvar(); fecharModal(); renderizar();
}
function acharClienteExistente(nome, tel){
  const n = semAcento(nome);
  const t = (tel||'').replace(/\D/g,'');
  return estado.clientes.find(c => semAcento(c.nome)===n || (t && (c.telefone||'').replace(/\D/g,'')===t));
}
function avisarDuplicado(existente){
  let html = '<div class="modal-cabe"><h2>Contato já existe</h2><button class="fechar" onclick="fecharModal()">×</button></div>';
  html += '<div class="obs-box">Já existe um cadastro com esse nome ou telefone, de '+escapar(existente.nome)+'.</div>';
  html += '<button class="btn btn-primario btn-largo" style="margin-bottom:10px" onclick="fecharModal();verCliente(\''+existente.id+'\')">Abrir cadastro existente</button>';
  html += '<button class="btn btn-contorno btn-largo" onclick="cadastrarMesmoAssim()">Cadastrar assim mesmo</button>';
  abrirModal(html);
}
function cadastrarMesmoAssim(){
  if(clientePendente){ finalizarNovoCliente(clientePendente); clientePendente = null; }
}

function alternarParcelas(){
  const st = document.getElementById('a-status').value;
  document.getElementById('bloco-parcelas').style.display = (st==='parcelado')?'block':'none';
}
function salvarAtendimento(clienteId){
  const data = document.getElementById('a-data').value || isoDeData(hoje());
  const valor = parseFloat(document.getElementById('a-valor').value)||0;
  const st = document.getElementById('a-status').value;
  let parcelas;
  if(st==='parcelado'){
    let n = parseInt(document.getElementById('a-nparcelas').value)||2;
    if(n<2) n=2;
    parcelas = gerarParcelas(valor, n, data, document.getElementById('a-primeira').checked);
  }else if(st==='aReceber'){
    parcelas = [{valor, vencimento:data, pago:false, dataPagamento:null}];
  }else{
    parcelas = [{valor, vencimento:data, pago:true, dataPagamento:data}];
  }
  const at = {
    id:id(), clienteId, data,
    servico: document.getElementById('a-serv').value,
    valor,
    formaPagamento: document.getElementById('a-pag').value,
    parcelas,
    observacoes: document.getElementById('a-obs').value.trim()
  };
  estado.atendimentos.push(at);
  salvar(); fecharModal(); verCliente(clienteId);
}

/* ---------- Dados consolidados do mês ---------- */
function nomeCliente(cid){ const c=estado.clientes.find(x=>x.id===cid); return c?c.nome:'Cliente'; }
function dadosMes(ano, mes){
  const doMes = estado.atendimentos.filter(a=>{ const d=dataDeIso(a.data); return d && d.getFullYear()===ano && d.getMonth()===mes; })
    .sort((a,b)=>a.data.localeCompare(b.data));
  const faturamento = doMes.reduce((s,a)=>s+(+a.valor||0),0);
  const recebido = doMes.reduce((s,a)=>s+valorPago(a),0);
  const aReceber = doMes.reduce((s,a)=>s+valorAberto(a),0);
  const qtd = doMes.length;
  const ticket = qtd?faturamento/qtd:0;

  const porServico = {};
  doMes.forEach(a=>{ porServico[a.servico]=(porServico[a.servico]||0)+(+a.valor||0); });

  const mapa = {};
  doMes.forEach(a=>{ (mapa[a.clienteId]=mapa[a.clienteId]||{qtd:0,total:0}); mapa[a.clienteId].qtd++; mapa[a.clienteId].total+=(+a.valor||0); });
  const atendidas = Object.entries(mapa).map(([cid,v])=>({cid,nome:nomeCliente(cid),qtd:v.qtd,total:v.total})).sort((a,b)=>a.nome.localeCompare(b.nome,'pt-BR'));

  const pagos = doMes.filter(a=>quitado(a));
  const pendentes = doMes.filter(a=>valorAberto(a)>=0.005).map(a=>{
    const pend = parcelasDe(a).map((p,i)=>({i,valor:p.valor,vencimento:p.vencimento,pago:p.pago})).filter(p=>!p.pago);
    return {a, pend, aberto:valorAberto(a)};
  });

  return {doMes, faturamento, recebido, aReceber, qtd, ticket, porServico, atendidas, pagos, pendentes};
}

  else D.atendidas.forEach(x=>{

/* ---------- Importar clientes de planilha CSV ---------- */
function parseCSV(texto){
  const primeira = (texto.split(/\r?\n/)[0]||'');
  const cont = { ';':primeira.split(';').length, ',':primeira.split(',').length, '\t':primeira.split('\t').length };
  let delim = ',';
  if(cont[';']>=cont[','] && cont[';']>=cont['\t']) delim=';';
  else if(cont['\t']>cont[',']) delim='\t';
  const linhas=[]; let campo='', linha=[], aspas=false;
  for(let i=0;i<texto.length;i++){
    const ch=texto[i];
    if(aspas){
      if(ch==='"'){ if(texto[i+1]==='"'){ campo+='"'; i++; } else aspas=false; }
      else campo+=ch;
    }else{
      if(ch==='"') aspas=true;
      else if(ch===delim){ linha.push(campo); campo=''; }
      else if(ch==='\n'){ linha.push(campo); linhas.push(linha); linha=[]; campo=''; }
      else if(ch!=='\r') campo+=ch;
    }
  }
  if(campo.length||linha.length){ linha.push(campo); linhas.push(linha); }
  return linhas;
}
function acharColuna(headers, aliases){
  for(let i=0;i<headers.length;i++){ if(aliases.includes(semAcento(headers[i]))) return i; }
  return -1;
}
function parseAniversarioCelula(v){
  if(!v) return '';
  v = String(v).trim();
  let m = v.match(/^(\d{1,2})[\/\-.](\d{1,2})(?:[\/\-.]\d{2,4})?$/);
  if(m){ const dia=+m[1], mes=+m[2]; if(mes>=1&&mes<=12&&dia>=1&&dia<=31) return String(mes).padStart(2,'0')+'-'+String(dia).padStart(2,'0'); }
  let m2 = v.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
  if(m2){ const mes=+m2[2], dia=+m2[3]; if(mes>=1&&mes<=12) return String(mes).padStart(2,'0')+'-'+String(dia).padStart(2,'0'); }
  return '';
}
function importarClientesPlanilha(ev){
  const arq = ev.target.files[0];
  if(!arq) return;
  const leitor = new FileReader();
  leitor.onload = e=>{
    const linhas = parseCSV(e.target.result).filter(l=>l.some(c=>c&&c.trim()));
    ev.target.value='';
    if(linhas.length<2){ alert('A planilha parece vazia ou sem cabeçalho. A primeira linha precisa ter os títulos das colunas.'); return; }
    const headers = linhas[0];
    const iNome = acharColuna(headers,['nome','cliente','nome completo','nome da cliente']);
    const iTel = acharColuna(headers,['telefone','celular','whatsapp','fone','tel','contato']);
    const iAniv = acharColuna(headers,['aniversario','nascimento','data de nascimento','aniv','data de aniversario','niver']);
    const iOrig = acharColuna(headers,['origem','como conheceu','indicacao','origem do contato']);
    const iObs = acharColuna(headers,['observacoes','obs','observacao','notas','anotacoes']);
    if(iNome<0){ alert('Não encontrei a coluna nome na planilha. A primeira linha precisa ter os títulos das colunas, com uma coluna chamada nome.'); return; }
    let novas=0, ignoradas=0; const duplicadas=new Set();
    for(let r=1;r<linhas.length;r++){
      const l = linhas[r];
      const nome = (l[iNome]||'').trim();
      if(!nome){ ignoradas++; continue; }
      const tel = iTel>=0?(l[iTel]||'').trim():'';
      const aniv = iAniv>=0?parseAniversarioCelula(l[iAniv]||''):'';
      const orig = iOrig>=0?(l[iOrig]||'').trim():'';
      const obs = iObs>=0?(l[iObs]||'').trim():'';
      const existente = acharClienteExistente(nome, tel);
      if(existente){
        existente.nome = nome;
        if(tel) existente.telefone = tel;
        if(aniv) existente.aniversario = aniv;
        if(orig) existente.origem = orig;
        if(obs) existente.observacoes = obs;
        duplicadas.add(existente.id);
      }else{
        estado.clientes.push({id:id(), nome, telefone:tel, aniversario:aniv, origem:orig, observacoes:obs, dataCadastro:isoDeData(hoje())});
        novas++;
      }
    }
    salvar();
    mostrarResultadoImportacao(novas, Array.from(duplicadas), ignoradas);
  };
  leitor.readAsText(arq,'UTF-8');
}
function mostrarResultadoImportacao(novas, duplicadas, ignoradas){
  let html = '<div class="modal-cabe"><h2>Importação concluída</h2><button class="fechar" onclick="fecharModal();renderizar()">×</button></div>';
  html += '<div class="resumo-perfil">';
  html += '<div class="bloco"><div class="n" style="color:var(--sage)">'+novas+'</div><div class="l">novas</div></div>';
  html += '<div class="bloco"><div class="n" style="color:var(--plum)">'+duplicadas.length+'</div><div class="l">já existiam</div></div>';
  html += '</div>';
  if(ignoradas>0) html += '<p style="font-size:13px;color:var(--muted);margin-bottom:12px">'+ignoradas+(ignoradas>1?' linhas sem nome foram ignoradas.':' linha sem nome foi ignorada.')+'</p>';
  if(duplicadas.length){
    html += '<div class="obs-box">Estes contatos já existiam e foram atualizados. Toque para abrir o cadastro original.</div>';
    duplicadas.forEach(cid=>{ const c=estado.clientes.find(x=>x.id===cid); if(c) html += linhaCliente(c,'<span class="selo emdia">atualizada</span>'); });
  }
  html += '<button class="btn btn-primario btn-largo" style="margin-top:16px" onclick="fecharModal();irPara(\'clientes\')">Ver todas as clientes</button>';
  abrirModal(html);
}

  lista.appendChild(div);
}
function salvarMensagens(){
  const textos = Array.from(document.querySelectorAll('.msg-aniv')).map(t=>t.value.trim()).filter(t=>t);
  estado.config.mensagensAniversario = textos.length ? textos : mensagensAnivPadrao();
  salvar(); fecharModal(); abrirAjustes();
}
function limparTudo(){
  if(!confirm('Apagar todos os dados de clientes, atendimentos e agendamentos? Esta ação não pode ser desfeita.')) return;
  estado.clientes=[]; estado.atendimentos=[]; estado.agendamentos=[]; estado.config=configPadrao();
  salvar(); fecharModal(); renderizar();
}
function carregarExemplos(){
  if(estado.clientes.length && !confirm('Isso adiciona clientes de exemplo aos dados atuais. Continuar?')) return;
  const nomes=['Ana Beatriz Souza','Camila Ribeiro','Juliana Martins','Patrícia Gomes','Renata Ferreira','Larissa Duarte'];
  const servs=estado.config.servicos;
  const h=hoje();
  nomes.forEach((nome,idx)=>{
    const cid=id();
    const aniv=new Date(1990+idx, (h.getMonth()+ (idx%2?0:0))%12, 5+idx);
    estado.clientes.push({id:cid,nome,telefone:'21 9'+(80000000+idx*11111),aniversario:isoDeData(aniv),origem:idx%2?'Indicação':'Instagram',observacoes:'',dataCadastro:isoDeData(h)});
    const nAt=1+(idx%3);
    for(let k=0;k<nAt;k++){
      const s=servs[(idx+k)%servs.length];
      const d=new Date(h); d.setDate(d.getDate()-(idx*9+k*30+5));
      let parcelas;
      if(idx===1 && k===0){ parcelas = gerarParcelas(240, 3, isoDeData(d), true); }
      else if(idx%3===0 && k===0){ parcelas = [{valor:80+idx*20+k*10, vencimento:isoDeData(d), pago:false, dataPagamento:null}]; }
      else { const v=80+idx*20+k*10; parcelas = [{valor:v, vencimento:isoDeData(d), pago:true, dataPagamento:isoDeData(d)}]; }
      const valorTotal = parcelas.reduce((s,p)=>s+p.valor,0);
      estado.atendimentos.push({id:id(),clienteId:cid,data:isoDeData(d),servico:s.nome,valor:valorTotal,formaPagamento:'Pix',parcelas,observacoes:''});
    }
  });
  salvar(); fecharModal(); renderizar();
}

/* ---------- Modal ---------- */
function abrirModal(html){
  document.getElementById('modal').innerHTML = html;
  document.getElementById('modal-fundo').classList.add('aberto');
  document.body.style.overflow='hidden';
}
function fecharModal(){
  document.getElementById('modal-fundo').classList.remove('aberto');
  document.body.style.overflow='';
}
document.getElementById('modal-fundo').addEventListener('click', e=>{ if(e.target.id==='modal-fundo') fecharModal(); });

/* ---------- Início ---------- */
carregar();
aplicarTelaInicial();
</script>
